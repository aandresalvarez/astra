name: CI

on:
  workflow_dispatch:
  schedule:
    - cron: "17 9 * * *"
  pull_request:
  push:
    branches:
      - main

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  focused-swift-tests:
    name: Focused Swift tests
    runs-on: macos-26
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Cache SwiftPM
        uses: actions/cache@v4
        with:
          path: |
            .build
            ~/.swiftpm
          key: ${{ runner.os }}-swiftpm-${{ hashFiles('Package.swift', 'Package.resolved') }}
          restore-keys: |
            ${{ runner.os }}-swiftpm-

      - name: Run focused Swift protection suites
        run: script/prepush.sh

  full-swift-test-suite:
    name: Full Swift test suite
    # Runs on every trigger the workflow fires on (pull_request, push, manual,
    # and the nightly schedule) so the full ~4,400-test suite actually gates PRs
    # instead of only running on a schedule. The focused job above still gives
    # fast early signal; this is the authoritative gate.
    runs-on: macos-26
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Cache SwiftPM
        uses: actions/cache@v4
        with:
          path: |
            .build
            ~/.swiftpm
          key: ${{ runner.os }}-swiftpm-${{ hashFiles('Package.swift', 'Package.resolved') }}
          restore-keys: |
            ${{ runner.os }}-swiftpm-

      - name: Run full Swift test suite
        run: swift test

  whitespace:
    name: Whitespace
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check whitespace
        run: |
          if [[ "${{ github.event_name }}" == "pull_request" ]]; then
            git fetch origin "${{ github.base_ref }}"
            git diff --check "origin/${{ github.base_ref }}...HEAD"
          else
            git diff-tree --check --no-commit-id --root -r HEAD
          fi
